services:
  flask:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - 5001:5001
    image: api:v1
    container_name: api
    networks:
      - backend
  
  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    ports: 
      - 8883:8883
    image: broker:v1
    container_name: broker
    networks:
      - backend
  
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    ports:
      - 5432:5432
    image: database:v1
    container_name: postgres
    networks:
      - backend

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: ingestor
    depends_on:
    - broker
    - database
    networks:
      - backend
networks:
  backend:
    driver: bridge